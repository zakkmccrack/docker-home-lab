<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The very cool people web Player</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div id="app">
        <button id="header-activate-button" onclick="activateNavbar()"
            class="fixed top-4 right-4 z-50 w-11 h-11 bg-zinc-600 backdrop-blur-md border-t border-zinc-300/40 cursor-pointer items-center justify-center hover:bg-zinc-600/50">+</button>
        <div id="library-header" class="fixed items-center gap-1 border-b bg-black z-40">
            <button class="home-button" onclick="goHomePage();">Home</button>
            <button data-nav="home" class="main-page-button" onclick="goMainPage()">Main Page</button>
            <button data-nav="albums" class="album-page-button" onclick="goAlbumPage()">Albums</button>
            <button data-nav="playlists" class=" playlist-page-button" onclick="goPlaylistsPage()">Playlists</button>
            <button data-nav="albums" class="album-page-button" onclick="showBigPicture()">Big
                Picture</button>
        </div>

        <div id="player-bar" class="fixed bottom-0 w-full bg-neutral-900 border-t border-neutral-700 px-2 py-3 gap-2.5">
            <div id="song-controls" class="flex w-full flex-row items-center justify-around">
                <div id="now-album-image" class="min-w-28 min-h-28 aspect-square bg-cover bg-center bg-no-repeat">
                </div>
                <div id="player-info" class="flex flex-col min-w-45">
                    <span id="now-title" class="font-bold text-lg">Nessun brano</span>
                    <span id="now-artist" class="text-md"></span>
                </div>
            </div>
            <div id="audio-controls" class="md:flex block w-full flex-row items-center justify-around">
                <div id="player-controls" class="flex gap-3">
                    <button id="btn-random">⤨</button>
                    <button id="btn-prev">⏮</button>
                    <button id="btn-play">▶</button>
                    <button id="btn-next">⏭</button>
                </div>
                <div id="player-progress" class="flex items-center gap-2 md:max-w-2/10 w-full flex-1">
                    <span id="time-current">0:00</span>
                    <input type="range" id="seekbar" value="0" min="0" step="1" class="flex-1">
                    <span id="time-total">0:00</span>
                </div>
                <!-- <div id="player-volume">
                    <span>🔊</span>
                    <input type="range" id="volumebar" value="100" min="0" max="100">
                </div> -->
            </div>
            <pre id="now-lyrics" class="hidden"></pre>
        </div>

        <div id="home" class="px-8 py-4">
            <p class="home-label" class="text-lg tracking-wider uppercase font-medium">Library</p>
            <div id="home-buttons" class="flex flex-col gap-1">
                <button onclick="goMainPage()"><span>♫</span> All Songs</button>
                <button onclick="goAlbumPage()"><span>◉</span> Albums</button>
                <button onclick="goPlaylistsPage()"><span>☰</span> Playlists</button>
                <hr>
                <button onclick="goSearchPage()"><span>⌕</span> Search</button>
                <button onclick="goCreatePlaylistPage()"><span>+</span> Create Playlist</button>

                <button onclick="goSettings()"><span>⚙</span> Settings - Empty</button>
            </div>
        </div>

        <div id="all-player">
            <div class="library">
                <div id="songs-number" class="pt-14">
                </div>
                <table id="song-table" class="w-full border-collapse">
                    <thead>
                        <tr>
                            <th><button onclick="orderByTitle()" id="title-col">Titolo</button></th>
                            <th><button onclick="orderByArtist()" id="artist-col">Artista</button></th>
                            <th><button onclick="orderByAlbum()" id="album-col">Album</button></th>
                            <th><button onclick="orderByTime()" id="duration-col">Durata</button></th>
                        </tr>
                    </thead>
                    <tbody id="song-list">

                    </tbody>
                </table>
            </div>
        </div>

        <div id="albums">
            <div class="library">
                <input type="text" class="search" id="album-search" placeholder="Cerca Album">

                <div id="albums-list" class="flex md:flex-col flex-row flex-wrap w-full h-fit md:gap-8 gap-3.5">
                </div>
            </div>
        </div>

        <div id="playlists">
            <div class="library">
                <input type="text" class="search" id="playlist-search" placeholder="Cerca">
                <div id="playlists-list">
                </div>
            </div>
        </div>

        <div id="search_tab">
            <div class="library">
                <input type="text" class="search" id="search" placeholder="Cerca">
                <div id="songs-number-serach">
                </div>

                <table id="song-table">
                    <tbody id="search-list">
                    </tbody>
                </table>
            </div>
        </div>

        <div id="create-playlist">
            <form id="playlist-form" method="post">
                <input type="text" name="playlist-name" id="playlist-name">
                <select name="song-selection" id="song-selection" multiple></select>
                <button type="submit">Crea Playlist</button>
            </form>
        </div>

        <div id="settings">
        </div>
    </div>
    <audio id="audio-engine"></audio>
    <script src="/static/player.js"></script>
    <script src="/static/general.js"></script>

</body>

</html>
